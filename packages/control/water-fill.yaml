# Water fill state machine — edge-based with model estimator
# Uses binary float switch (ADS1115 raw voltage) for full/not-full detection
# Model tracks estimated level between edges using fill/drain rates

external_components:
  - source:
      type: local
      path: components
    components: [water_controller]

water_controller:
  id: water_ctrl
  water_level_sensor: water_level_raw
  pump_output: water_pump_output
  float_switch_threshold: 1.5   # Midpoint between dry (~0V) and full (~3V)
  float_switch_active_high: true  # true = voltage >= threshold means full; false = voltage <= threshold
  pump_fill_rate: 1.0
  drain_rate: 0.1
  fill_trigger_level: 30.0
  critical_low_level: 15.0
  fill_timeout: 120s
  cooldown_duration: 300s

text_sensor:
  - platform: template
    name: "Water Controller State"
    id: water_state_text
    icon: "mdi:state-machine"
    entity_category: diagnostic
    update_interval: 5s
    lambda: |-
      return {id(water_ctrl).state_to_string(id(water_ctrl).get_state())};

sensor:
  - platform: template
    name: "Water Fill Count"
    id: water_fill_count
    icon: "mdi:counter"
    entity_category: diagnostic
    accuracy_decimals: 0
    update_interval: 10s
    lambda: |-
      return id(water_ctrl).get_fill_count();

  - platform: template
    name: "Water Estimated Level"
    id: water_estimated_level
    unit_of_measurement: "%"
    icon: "mdi:water-percent"
    entity_category: diagnostic
    accuracy_decimals: 1
    update_interval: 5s
    lambda: |-
      return id(water_ctrl).get_estimated_level();

  - platform: template
    name: "Water Model Uncertainty"
    id: water_model_uncertainty
    unit_of_measurement: "%"
    icon: "mdi:sigma"
    entity_category: diagnostic
    accuracy_decimals: 1
    update_interval: 10s
    lambda: |-
      return id(water_ctrl).get_uncertainty();

binary_sensor:
  - platform: template
    name: "Water Critical Low"
    id: water_critical_low_sensor
    device_class: problem
    lambda: |-
      return id(water_ctrl).is_critical_low();

button:
  - platform: template
    name: "Reset Water Error"
    id: water_error_reset
    icon: "mdi:restart-alert"
    entity_category: config
    on_press:
      - lambda: |-
          id(water_ctrl).reset_error();

  - platform: template
    name: "Manual Water Fill"
    id: water_manual_fill
    icon: "mdi:water-plus"
    entity_category: config
    on_press:
      - lambda: |-
          id(water_ctrl).request_fill();

# Sync runtime globals to water controller setpoints
interval:
  - interval: 30s
    then:
      - lambda: |-
          id(water_ctrl).set_fill_trigger_level(id(water_fill_trigger));
          id(water_ctrl).set_critical_low_level(id(water_critical_low));
          id(water_ctrl).set_pump_fill_rate(id(pump_fill_rate));
          id(water_ctrl).set_drain_rate(id(atomizer_drain_rate));
          id(water_ctrl).set_float_switch_threshold(id(float_switch_threshold));
          id(water_ctrl).set_pump_speed(id(water_pump_speed_val) / 100.0f);
