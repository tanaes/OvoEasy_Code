# Runtime-configurable globals — persisted in flash, editable via HA or local UI

globals:
  - id: target_temp
    type: float
    restore_value: true
    initial_value: "37.5"

  - id: target_humidity
    type: float
    restore_value: true
    initial_value: "55.0"

  - id: water_fill_trigger
    type: float
    restore_value: true
    initial_value: "30.0"

  - id: pump_fill_rate
    type: float
    restore_value: true
    initial_value: "1.0"

  - id: atomizer_drain_rate
    type: float
    restore_value: true
    initial_value: "0.1"

  - id: float_switch_threshold
    type: float
    restore_value: true
    initial_value: "1.5"

  - id: pid_kp_val
    type: float
    restore_value: true
    initial_value: "0.5"

  - id: pid_ki_val
    type: float
    restore_value: true
    initial_value: "0.001"

  - id: pid_kd_val
    type: float
    restore_value: true
    initial_value: "0.1"

  - id: vacuum_speed_val
    type: float
    restore_value: true
    initial_value: "100.0"

  - id: water_critical_low
    type: float
    restore_value: true
    initial_value: "15.0"

  - id: fan_min_speed
    type: float
    restore_value: true
    initial_value: "0.3"

  - id: heater_max_duty
    type: float
    restore_value: true
    initial_value: "0.5"

  # Phase 3: UI + telemetry
  - id: current_page
    type: int
    restore_value: false
    initial_value: "0"

  - id: incubation_start_day
    type: int
    restore_value: true
    initial_value: "0"

  - id: incubation_day
    type: int
    restore_value: false
    initial_value: "0"

# HA-exposed number entities for runtime configuration
number:
  - platform: template
    name: "Temperature Setpoint"
    id: temp_setpoint
    unit_of_measurement: "°C"
    icon: "mdi:thermometer"
    min_value: 20.0
    max_value: 42.0
    step: 0.1
    optimistic: true
    restore_value: true
    initial_value: 37.5
    set_action:
      - globals.set:
          id: target_temp
          value: !lambda "return x;"

  - platform: template
    name: "Humidity Setpoint"
    id: humidity_setpoint
    unit_of_measurement: "%"
    icon: "mdi:water-percent"
    min_value: 30.0
    max_value: 80.0
    step: 1.0
    optimistic: true
    restore_value: true
    initial_value: 55.0
    set_action:
      - globals.set:
          id: target_humidity
          value: !lambda "return x;"

  - platform: template
    name: "Water Fill Trigger Level"
    id: water_fill_trigger_setpoint
    unit_of_measurement: "%"
    icon: "mdi:cup-water"
    entity_category: config
    min_value: 10.0
    max_value: 50.0
    step: 5.0
    optimistic: true
    restore_value: true
    initial_value: 30.0
    set_action:
      - globals.set:
          id: water_fill_trigger
          value: !lambda "return x;"

  - platform: template
    name: "Pump Fill Rate"
    id: pump_fill_rate_setpoint
    unit_of_measurement: "%/s"
    icon: "mdi:pump"
    entity_category: config
    min_value: 0.1
    max_value: 5.0
    step: 0.1
    optimistic: true
    restore_value: true
    initial_value: 1.0
    set_action:
      - globals.set:
          id: pump_fill_rate
          value: !lambda "return x;"

  - platform: template
    name: "Atomizer Drain Rate"
    id: atomizer_drain_rate_setpoint
    unit_of_measurement: "%/s"
    icon: "mdi:water-minus"
    entity_category: config
    min_value: 0.01
    max_value: 1.0
    step: 0.01
    optimistic: true
    restore_value: true
    initial_value: 0.1
    set_action:
      - globals.set:
          id: atomizer_drain_rate
          value: !lambda "return x;"

  - platform: template
    name: "Float Switch Threshold"
    id: float_switch_threshold_setpoint
    unit_of_measurement: "V"
    icon: "mdi:sine-wave"
    entity_category: config
    min_value: 0.1
    max_value: 3.3
    step: 0.1
    optimistic: true
    restore_value: true
    initial_value: 1.5
    set_action:
      - globals.set:
          id: float_switch_threshold
          value: !lambda "return x;"

  - platform: template
    name: "Vacuum Pump Speed"
    id: vacuum_speed_setpoint
    unit_of_measurement: "%"
    icon: "mdi:fan"
    min_value: 0.0
    max_value: 100.0
    step: 5.0
    optimistic: true
    restore_value: true
    initial_value: 100.0
    set_action:
      - globals.set:
          id: vacuum_speed_val
          value: !lambda "return x;"

  - platform: template
    name: "Water Critical Low Level"
    id: water_critical_low_setpoint
    unit_of_measurement: "%"
    icon: "mdi:water-alert"
    entity_category: config
    min_value: 5.0
    max_value: 30.0
    step: 5.0
    optimistic: true
    restore_value: true
    initial_value: 15.0
    set_action:
      - globals.set:
          id: water_critical_low
          value: !lambda "return x;"

  - platform: template
    name: "Fan Minimum Speed"
    id: fan_min_speed_setpoint
    unit_of_measurement: "%"
    icon: "mdi:fan"
    entity_category: config
    min_value: 0.0
    max_value: 100.0
    step: 5.0
    optimistic: true
    restore_value: true
    initial_value: 30.0
    set_action:
      - globals.set:
          id: fan_min_speed
          value: !lambda "return x / 100.0;"

  - platform: template
    name: "Heater Max Duty"
    id: heater_max_duty_setpoint
    unit_of_measurement: "%"
    icon: "mdi:fire"
    entity_category: config
    min_value: 10.0
    max_value: 100.0
    step: 5.0
    optimistic: true
    restore_value: true
    initial_value: 50.0
    set_action:
      - globals.set:
          id: heater_max_duty
          value: !lambda "return x / 100.0;"
      - lambda: |-
          id(heater_pwm).set_max_power(id(heater_max_duty));

  # Advanced PID tuning (entity_category: config hides from default dashboard)
  - platform: template
    name: "PID Kp"
    id: pid_kp_number
    icon: "mdi:tune"
    entity_category: config
    min_value: 0.0
    max_value: 10.0
    step: 0.001
    optimistic: true
    restore_value: true
    initial_value: 0.5
    set_action:
      - globals.set:
          id: pid_kp_val
          value: !lambda "return x;"

  - platform: template
    name: "PID Ki"
    id: pid_ki_number
    icon: "mdi:tune"
    entity_category: config
    min_value: 0.0
    max_value: 1.0
    step: 0.0001
    optimistic: true
    restore_value: true
    initial_value: 0.001
    set_action:
      - globals.set:
          id: pid_ki_val
          value: !lambda "return x;"

  - platform: template
    name: "PID Kd"
    id: pid_kd_number
    icon: "mdi:tune"
    entity_category: config
    min_value: 0.0
    max_value: 50.0
    step: 0.01
    optimistic: true
    restore_value: true
    initial_value: 0.1
    set_action:
      - globals.set:
          id: pid_kd_val
          value: !lambda "return x;"

# Sensor selection
# "Auto" picks first available (non-NaN) sensor in priority order:
#   SHT4x -> BME280 -> HDC1080 -> AHT30
# Manual options (1-4) override Auto with a fixed sensor.
# Index order is referenced by lambdas in packages/hardware/sensors-env.yaml.
select:
  - platform: template
    name: "Control Sensor"
    id: control_sensor_select
    icon: "mdi:thermometer-check"
    options:
      - "Auto"
      - "SHT45"
      - "BME280"
      - "HDC1080"
      - "AHT30"
    initial_option: "Auto"
    optimistic: true
    restore_value: true
