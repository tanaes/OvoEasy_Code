# W5500 SPI ethernet — used by the ethernet-variant top-level entry point (ovoeasy-eth.yaml).
# Substitutions do not expand inside ESPHome `!include` paths, so the two variants
# use separate top-level YAML files rather than a `-s network_type` flag.
# See docs/superpowers/plans/2026-05-08-ethernet-failover-design.md for rationale.

ethernet:
  type: W5500
  clk_pin: GPIO36
  mosi_pin: GPIO35
  miso_pin: GPIO37
  cs_pin: GPIO39
  reset_pin: GPIO15
  polling_interval: 1s   # No INT pin wired. Explicit polling_interval closes
                         # the uninitialized-interrupt_pin footgun (esphome/issues#6268).

text_sensor:
  - platform: ethernet_info
    ip_address:
      name: "IP Address"
      entity_category: diagnostic
    mac_address:
      name: "MAC Address"
      entity_category: diagnostic

sensor:
  # Stub sensor so shared UI lambdas referencing id(wifi_signal_sensor) still
  # validate in the ethernet variant. The label-update lambda guards its body
  # with `#ifdef USE_WIFI` and falls through to the ethernet branch at runtime,
  # so this sensor is never actually read — it only satisfies YAML-stage ID
  # resolution. Internal so it doesn't clutter HA.
  - platform: template
    id: wifi_signal_sensor
    internal: true
    update_interval: never
