spi:
  id: spi_bus
  # Explicitly assign this bus to SPI3_HOST so that SPI2_HOST is free for the
  # optional W5500 ethernet module (W5500 hard-requires SPI2_HOST on ESP32-S3).
  # ESP32-S3's GPIO matrix routes any SPI host to any GPIO, so the physical
  # pins below are unchanged — only the internal controller assignment changes.
  interface: spi3
  clk_pin: GPIO12
  mosi_pin: GPIO11
  miso_pin: GPIO13
