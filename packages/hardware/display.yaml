# ILI9341 2.4" TFT display (320x240, SPI, vertical orientation)
# LVGL owns rendering — this file is hardware-only.

display:
  - platform: ili9xxx
    id: tft_display
    model: ILI9341
    spi_id: spi_bus
    cs_pin: GPIO10
    dc_pin: GPIO47
    reset_pin: GPIO16
    invert_colors: false
    rotation: 180
    dimensions:
      height: 320
      width: 240
