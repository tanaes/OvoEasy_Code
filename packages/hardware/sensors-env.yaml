# Environmental sensors: SHT45, HDC1080, BME280, AHT30
# All four are always monitored. A global select chooses which feeds control loops.
# Default "Auto" picks the first available (non-NaN) sensor in priority order:
#   SHT4x -> BME280 -> HDC1080 -> AHT30

sensor:
  # --- SHT45 (0x44) ---
  # Onboard heater used at low duty to drive off condensation in the high-RH
  # incubator chamber. LOW power + SHORT pulse keeps self-heating bias minimal
  # while still preventing moisture buildup on the sensing element.
  #   heater_max_duty: 0.0–0.05  (fraction of time heater is on; 0.0 disables)
  #   heater_power:    High (200mW) | Med (110mW) | Low (20mW)
  #   heater_time:     Long (1.0s)  | Short (0.1s)
  - platform: sht4x
    i2c_id: i2c_bus
    address: 0x44
    precision: High
    heater_max_duty: 0.00167  # ~1s pulse every 10 minutes
    heater_power: Low
    heater_time: Long
    temperature:
      name: "SHT45 Temperature"
      id: sht45_temp
      accuracy_decimals: 2
      filters:
        - sliding_window_moving_average:
            window_size: 5
            send_every: 1
    humidity:
      name: "SHT45 Humidity"
      id: sht45_humidity
      accuracy_decimals: 1
      filters:
        - sliding_window_moving_average:
            window_size: 5
            send_every: 1
    update_interval: 10s

  # --- HDC1080 (0x40) ---
  - platform: hdc1080
    i2c_id: i2c_bus
    address: 0x40
    temperature:
      name: "HDC1080 Temperature"
      id: hdc1080_temp
      accuracy_decimals: 2
      filters:
        - sliding_window_moving_average:
            window_size: 5
            send_every: 1
    humidity:
      name: "HDC1080 Humidity"
      id: hdc1080_humidity
      accuracy_decimals: 1
      filters:
        - sliding_window_moving_average:
            window_size: 5
            send_every: 1
    update_interval: 10s

  # --- BME280 (0x76) ---
  - platform: bme280_i2c
    i2c_id: i2c_bus
    address: 0x76
    temperature:
      name: "BME280 Temperature"
      id: bme280_temp
      accuracy_decimals: 2
      oversampling: 16x
      filters:
        - sliding_window_moving_average:
            window_size: 5
            send_every: 1
    humidity:
      name: "BME280 Humidity"
      id: bme280_humidity
      accuracy_decimals: 1
      oversampling: 16x
      filters:
        - sliding_window_moving_average:
            window_size: 5
            send_every: 1
    pressure:
      name: "BME280 Pressure"
      id: bme280_pressure
      accuracy_decimals: 1
      oversampling: 16x
    update_interval: 10s

  # --- AHT30 (0x38) — uses AHT20-compatible protocol ---
  - platform: aht10
    i2c_id: i2c_bus
    address: 0x38
    variant: AHT20
    temperature:
      name: "AHT30 Temperature"
      id: aht30_temp
      accuracy_decimals: 2
      filters:
        - sliding_window_moving_average:
            window_size: 5
            send_every: 1
    humidity:
      name: "AHT30 Humidity"
      id: aht30_humidity
      accuracy_decimals: 1
      filters:
        - sliding_window_moving_average:
            window_size: 5
            send_every: 1
    update_interval: 10s

  # --- Template sensors: route selected sensor to control loops ---
  # Select index map (must match options order in globals.yaml):
  #   0 = Auto (priority: SHT45 -> BME280 -> HDC1080 -> AHT30)
  #   1 = SHT45    2 = BME280    3 = HDC1080    4 = AHT30
  - platform: template
    name: "Control Temperature"
    id: control_temp
    unit_of_measurement: "°C"
    device_class: temperature
    accuracy_decimals: 2
    update_interval: 10s
    lambda: |-
      auto selection = id(control_sensor_select).active_index();
      int sel = selection.has_value() ? selection.value() : 0;
      switch (sel) {
        case 1: return id(sht45_temp).state;
        case 2: return id(bme280_temp).state;
        case 3: return id(hdc1080_temp).state;
        case 4: return id(aht30_temp).state;
        case 0:
        default:
          if (!isnan(id(sht45_temp).state))   return id(sht45_temp).state;
          if (!isnan(id(bme280_temp).state))  return id(bme280_temp).state;
          if (!isnan(id(hdc1080_temp).state)) return id(hdc1080_temp).state;
          if (!isnan(id(aht30_temp).state))   return id(aht30_temp).state;
          return NAN;
      }

  - platform: template
    name: "Control Humidity"
    id: control_humidity
    unit_of_measurement: "%"
    device_class: humidity
    accuracy_decimals: 1
    update_interval: 10s
    lambda: |-
      auto selection = id(control_sensor_select).active_index();
      int sel = selection.has_value() ? selection.value() : 0;
      switch (sel) {
        case 1: return id(sht45_humidity).state;
        case 2: return id(bme280_humidity).state;
        case 3: return id(hdc1080_humidity).state;
        case 4: return id(aht30_humidity).state;
        case 0:
        default:
          if (!isnan(id(sht45_humidity).state))   return id(sht45_humidity).state;
          if (!isnan(id(bme280_humidity).state))  return id(bme280_humidity).state;
          if (!isnan(id(hdc1080_humidity).state)) return id(hdc1080_humidity).state;
          if (!isnan(id(aht30_humidity).state))   return id(aht30_humidity).state;
          return NAN;
      }

  # Diagnostic: which sensor is currently feeding the control loops
  - platform: template
    name: "Active Control Sensor"
    id: active_control_sensor_idx
    entity_category: diagnostic
    accuracy_decimals: 0
    update_interval: 10s
    lambda: |-
      auto selection = id(control_sensor_select).active_index();
      int sel = selection.has_value() ? selection.value() : 0;
      if (sel != 0) return (float)sel;  // manual override
      if (!isnan(id(sht45_temp).state))   return 1.0f;
      if (!isnan(id(bme280_temp).state))  return 2.0f;
      if (!isnan(id(hdc1080_temp).state)) return 3.0f;
      if (!isnan(id(aht30_temp).state))   return 4.0f;
      return 0.0f;
