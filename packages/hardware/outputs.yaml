# MOSFET outputs — PWM for heater/fan/pumps, binary for humidifier

output:
  # PWM outputs for PID control
  - platform: ledc
    pin: GPIO4
    id: fan_pwm
    frequency: 1000Hz

  - platform: ledc
    pin: GPIO5
    id: heater_pwm
    frequency: 1000Hz
    max_power: 0.5

  # Binary output (bang-bang humidifier)
  - platform: gpio
    pin: GPIO2
    id: humidity_output
    inverted: false

  # PWM outputs for pumps — driven at configured speed when "on"
  - platform: ledc
    pin: GPIO6
    id: water_pump_output
    frequency: 1000Hz

  - platform: ledc
    pin: GPIO7
    id: vacuum_pump_output
    frequency: 1000Hz

# Servo PWM output (level-shifted 3.3V → 5V on PCB)
  - platform: ledc
    pin: GPIO38
    id: servo_pwm
    frequency: 50Hz

servo:
  - id: egg_turner_servo
    output: servo_pwm
    auto_detach_time: 2s
    transition_length: 2s

# Manual switches — humidifier and water pump are internal (owned by control loops)
# Vacuum pump is a template switch so that turn_on/turn_off honour the
# configured speed (vacuum_speed_val %). `switch.output` writes 1.0/0.0 to the
# underlying FloatOutput, which would clobber any separately-set level.
switch:
  - platform: output
    name: "Humidifier"
    id: humidifier_switch
    output: humidity_output
    internal: true

  - platform: output
    name: "Water Pump"
    id: water_pump_switch
    output: water_pump_output
    internal: true

  - platform: template
    name: "Vacuum Pump"
    id: vacuum_pump_switch
    icon: "mdi:fan"
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - output.set_level:
          id: vacuum_pump_output
          level: !lambda "return id(vacuum_speed_val) / 100.0;"
    turn_off_action:
      - output.set_level:
          id: vacuum_pump_output
          level: 0.0

# Servo position control (-100% to +100%)
number:
  - platform: template
    name: "Egg Turner Position"
    id: egg_turner_position
    min_value: -100
    max_value: 100
    step: 1
    initial_value: 0
    optimistic: true
    set_action:
      - servo.write:
          id: egg_turner_servo
          level: !lambda "return x / 100.0;"

# Fan is managed by PID temperature package (always-on at minimum speed)
# No separate fan entity — fan_pwm is controlled directly via interval lambda
