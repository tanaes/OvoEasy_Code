# MOSFET outputs — PWM for heater/fan, binary for pumps/humidifier

output:
  # PWM outputs for PID control
  - platform: ledc
    pin: GPIO4
    id: fan_pwm
    frequency: 1000Hz

  - platform: ledc
    pin: GPIO5
    id: heater_pwm
    frequency: 1000Hz

  # Binary outputs
  - platform: gpio
    pin: GPIO2
    id: humidity_output
    inverted: false

  - platform: gpio
    pin: GPIO6
    id: water_pump_output
    inverted: false

  - platform: gpio
    pin: GPIO7
    id: vacuum_pump_output
    inverted: false

# Manual switches — humidifier and water pump are internal (owned by control loops)
switch:
  - platform: output
    name: "Humidifier"
    id: humidifier_switch
    output: humidity_output
    internal: true

  - platform: output
    name: "Water Pump"
    id: water_pump_switch
    output: water_pump_output
    internal: true

  - platform: output
    name: "Vacuum Pump"
    id: vacuum_pump_switch
    output: vacuum_pump_output
    entity_category: ""

# Fan is managed by PID temperature package (always-on at minimum speed)
# No separate fan entity — fan_pwm is controlled directly via interval lambda
