# MOSFET outputs — PWM for heater/fan, binary for pumps/humidifier

output:
  # PWM outputs for PID control
  - platform: ledc
    pin: GPIO4
    id: fan_pwm
    frequency: 1000Hz

  - platform: ledc
    pin: GPIO5
    id: heater_pwm
    frequency: 1000Hz

  # Binary outputs
  - platform: gpio
    pin: GPIO2
    id: humidity_output
    inverted: false

  - platform: gpio
    pin: GPIO6
    id: water_pump_output
    inverted: false

  - platform: gpio
    pin: GPIO7
    id: vacuum_pump_output
    inverted: false

# Servo PWM output (level-shifted 3.3V → 5V on PCB)
  - platform: ledc
    pin: GPIO38
    id: servo_pwm
    frequency: 50Hz

servo:
  - id: egg_turner_servo
    output: servo_pwm
    auto_detach_time: 2s
    transition_length: 2s

# Manual switches — humidifier and water pump are internal (owned by control loops)
switch:
  - platform: output
    name: "Humidifier"
    id: humidifier_switch
    output: humidity_output
    internal: true

  - platform: output
    name: "Water Pump"
    id: water_pump_switch
    output: water_pump_output
    internal: true

  - platform: output
    name: "Vacuum Pump"
    id: vacuum_pump_switch
    output: vacuum_pump_output
    entity_category: ""

# Servo position control (-100% to +100%)
number:
  - platform: template
    name: "Egg Turner Position"
    id: egg_turner_position
    min_value: -100
    max_value: 100
    step: 1
    initial_value: 0
    optimistic: true
    set_action:
      - servo.write:
          id: egg_turner_servo
          level: !lambda "return x / 100.0;"

# Fan is managed by PID temperature package (always-on at minimum speed)
# No separate fan entity — fan_pwm is controlled directly via interval lambda
