# WS2814 RGBW interior chamber lighting (2 chips on GPIO1).
# RGBW: separate R, G, B, and W LEDs per chip. The white channel is the
# primary illumination; RGB are for special-purpose colors (e.g. red for
# low-disturbance night inspection).

light:
  - platform: esp32_rmt_led_strip
    id: chamber_leds
    name: "Chamber Lights"
    pin: GPIO1
    num_leds: 2
    rgb_order: RGB
    chipset: WS2811
    is_rgbw: true
    use_psram: false
    rmt_symbols: 48
    default_transition_length: 500ms
    effects:
      - pulse:
          name: "Breathing"
          min_brightness: 30%
          max_brightness: 100%
          transition_length: 2s
          update_interval: 2s
